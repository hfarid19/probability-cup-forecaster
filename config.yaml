# Sensible conservative defaults. Region: UK. Tune as you validate.
bankroll: 1000.0              # GBP; staking capital, isolated from other funds

strategy:
  edge_threshold: 0.04        # min |P_model - P_market| to act (4%); must cover commission + slippage
  kelly_fraction: 0.25        # quarter-Kelly; full Kelly is too aggressive given model error

risk:
  max_position_per_market: 0.05   # fraction of bankroll per market
  max_exposure_per_team: 0.15     # aggregate cap across correlated markets for one team
  max_total_deployed: 0.50        # never deploy more than half the bankroll at once
  max_drawdown_halt: 0.20         # flatten + halt trading if drawdown exceeds 20%

betfair:
  commission_rate: 0.05       # UK standard market base rate (varies by market)
  markets:
    - MATCH_ODDS              # start with 3-way match winner; tournament futures later
  poll_interval_seconds: 30   # value trading is not latency-sensitive
